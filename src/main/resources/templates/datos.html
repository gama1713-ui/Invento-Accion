<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Tratamiento de datos - Invento Acción</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--primary:#2563eb;--secondary:#1e40af;--dark:#1f2937;}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:var(--dark);line-height:1.6;}
    .navbar{background:linear-gradient(135deg,var(--primary)0%,var(--secondary)100%);padding:1rem 0;}
    .navbar-brand{color:#fff!important;font-weight:bold;} .nav-link{color:rgba(255,255,255,0.85)!important;}.nav-link:hover{color:#fff!important;}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">Invento <span>Acción</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/nosotros}">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/contacto}">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container my-5">
    <h1>Tratamiento de datos</h1>
    <p>Aquí describimos la política de tratamiento de datos personales de Invento Acción.</p>
    <a th:href="@{/}" class="btn btn-primary">Volver al inicio</a>
  </section>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <small>&copy; 2026 Invento Acción.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) { target.scrollIntoView({ behavior: 'smooth' }); }
      });
    });
  </script>
</body>
</html>
