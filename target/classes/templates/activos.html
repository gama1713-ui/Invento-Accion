<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"/><title>Activos</title></head>
<body>
  <h1>Activos</h1>
  <a th:href="@{/activos/nuevo}">Nuevo activo</a>

  <table border="1">
    <thead><tr><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Ubicación</th></tr></thead>
    <tbody>
      <tr th:each="a : ${activos}">
        <td th:text="${a.id}">1</td>
        <td th:text="${a.nombre}">Nombre</td>
        <td th:text="${a.cantidadActual}">0</td>
        <td th:text="${a.ubicacion}">Ubic</td>
      </tr>
    </tbody>
  </table>
  <a th:href="@{/}">Volver</a>

</body>
</html>
