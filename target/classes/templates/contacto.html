<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Contáctanos - Invento Acción</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Copied colores y estilos básicos del index */
    :root { --primary: #2563eb; --secondary: #1e40af; --dark: #1f2937; }
    body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:var(--dark);line-height:1.6;}
    .navbar{background:linear-gradient(135deg,var(--primary)0%,var(--secondary)100%);padding:1rem 0;}
    .navbar-brand{color:#fff!important;font-weight:bold;} .nav-link{color:rgba(255,255,255,0.85)!important;}
    .nav-link:hover{color:#fff!important;}
  </style>
</head>
<body>
  <!-- Header/Nav -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">Invento <span>Acción</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/nosotros}">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/contacto}">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido específico: Get in Touch (plantilla adaptada) -->
  <section class="page-section">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6 py-3">
          <h2 class="title-section">Ponte en <span class="marked">Contacto</span></h2>
          <div class="divider"></div>
          <p class="mb-3">Escríbenos para preguntas, soporte o información sobre Invento Acción.</p>

          <ul class="list-unstyled">
            <li class="mb-2"><i class="fas fa-map-marker-alt me-2"></i> Medellín, Colombia</li>
            <li class="mb-2"><i class="fas fa-envelope me-2"></i> <a href="mailto:soporte@inventoaccion.com">soporte@inventoaccion.com</a></li>
            <li class="mb-2"><i class="fas fa-phone me-2"></i> <a href="tel:+573001234567">+57 300 123 45 67</a></li>
          </ul>
        </div>

        <div class="col-lg-6 py-3">
          <div class="subhead">Contáctanos</div>
          <h2 class="title-section">Envíanos un mensaje</h2>
          <div class="divider"></div>

          <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
          <form th:action="@{/contacto/enviar}" method="post">
            <div class="py-2">
              <input name="nombre" type="text" class="form-control" placeholder="Nombre completo" required>
            </div>
            <div class="py-2">
              <input name="email" type="email" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="py-2">
              <textarea name="mensaje" rows="6" class="form-control" placeholder="Tu mensaje" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary rounded-pill mt-3">Enviar mensaje</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer común -->
  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <small>&copy; 2026 Invento Acción.</small>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) { target.scrollIntoView({ behavior: 'smooth' }); }
      });
    });
  </script>
</body>
</html>
